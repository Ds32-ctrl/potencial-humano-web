<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anthropotechnology | Panel de Control</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --text-main: #c9d1d9;
            --accent: #58a6ff;
            --accent-glow: rgba(88, 166, 255, 0.4);
            --card-bg: #161b22;
            --success: #238636;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 8vh 20px 4vh;
            border-bottom: 1px solid #30363d;
            background: linear-gradient(180deg, rgba(22,27,34,1) 0%, rgba(13,17,23,1) 100%);
        }

        h1 {
            font-size: 2.8rem;
            color: #ffffff;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #8b949e;
            max-width: 700px;
            margin: 0 auto 20px;
        }

        .highlight {
            color: var(--accent);
            text-shadow: 0 0 15px var(--accent-glow);
        }

        /* Diseño de botones */
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            background-color: var(--card-bg);
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background-color: var(--accent);
            color: #000;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .btn-primary {
            background-color: var(--success);
            color: white;
            border-color: var(--success);
        }

        .btn-primary:hover {
            background-color: #2ea043;
            color: white;
            box-shadow: 0 0 15px rgba(46, 160, 67, 0.4);
        }

        main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        /* Consola mejorada */
        .console {
            background: #010409;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Courier New', Courier, monospace;
            color: #3fb950;
            margin-bottom: 30px;
            border: 1px solid #30363d;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 25px;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            border-color: var(--accent);
        }

        .card h3 {
            color: #ffffff;
            margin-top: 0;
            border-bottom: 1px solid #30363d;
            padding-bottom: 10px;
        }

        .status-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            background: rgba(88, 166, 255, 0.1);
            color: var(--accent);
            border: 1px solid var(--accent);
            margin-bottom: 10px;
        }

        footer {
            text-align: center;
            padding: 30px;
            font-size: 0.9rem;
            color: #8b949e;
            border-top: 1px solid #30363d;
            margin-top: 10vh;
        }
    </style>
</head>
<body>

    <header>
        <h1>Implementation of <span class="highlight">Anthropotechnology</span></h1>
        <p class="subtitle">Infraestructura central diseñada para la expansión del potencial humano.</p>
        
        <div class="btn-container">
            <button class="btn" onclick="cargarModulos()">Recargar Nodos</button>
            <a href="/api" target="_blank" class="btn btn-primary">Ver Documentación API</a>
        </div>
    </header>

    <main>
        <div class="console" id="status-console">
            > Inicializando protocolos de comunicación...<br>
        </div>

        <div class="grid-container" id="modulos-container">
            </div>
    </main>

    <footer>
        <p>Potencial Humano Web &copy; 2026 | Desarrollado y desplegado en AWS.</p>
    </footer>

    <script>
        // Función 1: Obtener el estado general del sistema
        async function comprobarEstado() {
            const consoleDiv = document.getElementById('status-console');
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                // Determinamos el color de la memoria
                const memoryColor = data.estado_memoria.includes("Conectada") ? "#3fb950" : "#f85149";

                consoleDiv.innerHTML = `
                    > Ping a servidor central: <span style="color: #58a6ff;">OK</span><br>
                    > Servidor Lógico: <span style="color: #fff;">${data.estado_servidor}</span><br>
                    > Memoria RDS (Base de datos): <span style="color: ${memoryColor}; font-weight: bold;">${data.estado_memoria}</span><br>
                    > <span style="color: #58a6ff;">Mensaje: ${data.mensaje}</span>
                `;
            } catch (error) {
                consoleDiv.innerHTML = "> <span style='color: #f85149;'>Error crítico: No hay respuesta del motor API.</span>";
            }
        }

        // Función 2: Obtener y dibujar las tarjetas de los módulos
        async function cargarModulos() {
            const container = document.getElementById('modulos-container');
            container.innerHTML = "<p style='text-align: center; width: 100%;'>Descargando datos de la API...</p>";
            
            try {
                const response = await fetch('/api/modulos');
                const modulos = await response.json();
                
                container.innerHTML = ''; // Limpiamos el mensaje de carga
                
                // Iteramos sobre los datos y creamos una tarjeta HTML para cada uno
                modulos.forEach(modulo => {
                    const card = `
                        <div class="card">
                            <span class="status-badge">${modulo.estado}</span>
                            <h3>${modulo.nombre}</h3>
                            <p><strong>Tipo:</strong> ${modulo.tipo}</p>
                            <p>Módulo sincronizado con la base de datos central de APH. Operaciones nominales.</p>
                        </div>
                    `;
                    container.innerHTML += card;
                });
            } catch (error) {
                container.innerHTML = "<p style='color: #f85149;'>Error al cargar los módulos. Verifica la conexión con el servidor.</p>";
            }
        }

        // Ejecutar funciones apenas cargue la página
        document.addEventListener("DOMContentLoaded", () => {
            comprobarEstado();
            cargarModulos();
        });
    </script>
</body>
</html>
